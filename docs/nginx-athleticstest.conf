# nginx config for the temporary test deployment at
# athleticstest.nicoruggieri.com (a droplet spun up to try the site live,
# not the eventual polandbulldogs.org production box — see
# docs/nginx.conf.example for that one). Same shape, different domain.
#
# Cloudflare (orange-clouded DNS) sits in front, so the firewall should
# restrict inbound 80/443 to Cloudflare's published IP ranges
# (https://www.cloudflare.com/ips/) plus SSH from your own IP.

server {
    listen 80;
    server_name athleticstest.nicoruggieri.com www.athleticstest.nicoruggieri.com;

    root /var/www/athletics-website/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }

    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

server {
    listen 80;
    server_name cms.athleticstest.nicoruggieri.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    client_max_body_size 25m; # media uploads
}

# TLS: terminate at Cloudflare (Full or Full-Strict SSL mode). Add the
# standard `listen 443 ssl;` blocks once a Cloudflare origin certificate is
# installed (Cloudflare issues these free — Origin Server pages in the
# dashboard for the zone).
