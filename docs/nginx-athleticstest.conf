# nginx config for the temporary test deployment at
# athleticstest.nicoruggieri.com (a droplet spun up to try the site live,
# not the eventual polandbulldogs.org production box — see
# docs/nginx.conf.example for that one). Same shape, different domain.
#
# DNS-only (no Cloudflare proxy) for this test box — TLS is a real Let's
# Encrypt certificate issued directly via `certbot --nginx`, which also adds
# the `listen 443 ssl;` blocks and the 80->443 redirect on top of this file
# (this checked-in copy is the pre-certbot version for reference; the actual
# server's /etc/nginx/sites-available/athletics has certbot's edits applied).
#
# root points at `current`, a symlink flipped atomically by
# apps/web/deploy-build.sh after each successful build — see the comment in
# docs/nginx.conf.example for why (pointing straight at `dist` causes
# visitor-facing 404s during every rebuild).

server {
    listen 80;
    server_name athleticstest.nicoruggieri.com www.athleticstest.nicoruggieri.com;

    root /var/www/athletics-website/apps/web/current;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }

    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

server {
    listen 80;
    server_name cms.athleticstest.nicoruggieri.com;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    client_max_body_size 25m; # media uploads
}

# TLS: `sudo certbot --nginx -d athleticstest.nicoruggieri.com -d cms.athleticstest.nicoruggieri.com --redirect`
# issues real certificates and edits the live config in place to add the
# `listen 443 ssl;` blocks + HTTP->HTTPS redirect. Re-run certbot (or let
# its systemd timer handle renewal) rather than hand-editing those blocks.
