name: Deploy to production

# Runs scripts/deploy.sh on the server after every push to main. The SSH key
# used here is restricted server-side (see docs/DEPLOY.md's "Auto-deploy"
# section) to only ever run that one script, regardless of what command is
# actually sent — so even if this key leaked, it couldn't be used for
# anything beyond triggering a deploy of already-reviewed, already-merged
# code.
on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_HOST }}" true
